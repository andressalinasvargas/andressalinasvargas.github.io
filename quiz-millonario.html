<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>¿Quién Quiere Ser Analista? — Elicitación de Requisitos</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════ */
:root {
  --bg:       #040812;
  --panel:    #07122a;
  --gold:     #f5c842;
  --gold2:    #e8a800;
  --cyan:     #00d4ff;
  --white:    #e8f0ff;
  --muted:    #4a6090;
  --correct:  #00e676;
  --wrong:    #ff3d3d;
  --orange:   #ff8c00;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Open Sans', sans-serif;
  overflow: hidden;
  color: var(--white);
}

/* ── Animated starfield bg ── */
#starfield {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,100,255,.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,60,160,.12) 0%, transparent 50%),
    #040812;
}
#starfield canvas { position: absolute; inset: 0; }

/* ── Main layout ── */
#game {
  position: relative; z-index: 1;
  display: flex; align-items: stretch; justify-content: center;
  width: 100%; height: 100%;
}

/* ── Left ladder ── */
#ladder {
  width: 190px;
  display: flex; flex-direction: column-reverse;
  padding: 12px 8px;
  gap: 3px;
  overflow: hidden;
  background: linear-gradient(180deg, transparent, rgba(0,30,80,.5));
  border-right: 1px solid rgba(0,100,255,.15);
}
.lrung {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
  transition: all .3s;
  opacity: .55;
  cursor: default;
}
.lrung.milestone {
  opacity: .7;
  border: 1px solid rgba(255,198,66,.3);
}
.lrung.active {
  opacity: 1 !important;
  background: linear-gradient(90deg, rgba(245,200,66,.2), rgba(245,200,66,.05));
  border: 1px solid rgba(245,200,66,.6);
  box-shadow: 0 0 12px rgba(245,200,66,.25);
}
.lrung.passed { opacity: .4; }
.lrung.milestone.passed { opacity: .6; color: var(--gold); }
.lrung .lnum { font-size: 10px; color: var(--muted); }
.lrung .lval { color: var(--gold); font-weight: 700; }
.milestone .lval { color: var(--gold); }

/* ── Center stage ── */
#stage {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 16px 24px;
  max-width: 860px;
}

/* ── Top bar ── */
#topbar {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
#show-title {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 900;
  letter-spacing: .12em;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(245,200,66,.5);
}
#lifelines {
  display: flex; gap: 10px;
}
.lifeline {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
  transition: all .22s;
}
.lifeline:hover:not(.used) .ll-icon { transform: scale(1.1); }
.ll-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid rgba(245,200,66,.6);
  background: radial-gradient(circle at 40% 35%, rgba(245,200,66,.25), rgba(245,200,66,.06));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all .3s;
}
.lifeline.used .ll-icon {
  border-color: rgba(255,255,255,.12);
  background: rgba(255,255,255,.04);
  opacity: .35;
  filter: grayscale(1);
}
.ll-label { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: .08em; text-align: center; }

/* ── Question panel ── */
#q-panel {
  width: 100%;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,80,200,.35), rgba(0,20,80,.85) 70%);
  border: 2px solid rgba(0,150,255,.4);
  border-radius: 16px;
  padding: 28px 32px 24px;
  margin-bottom: 20px;
  position: relative;
  box-shadow:
    0 0 40px rgba(0,100,255,.2),
    inset 0 1px 0 rgba(255,255,255,.08);
  min-height: 110px;
  display: flex; align-items: center; justify-content: center;
}
#q-panel::before, #q-panel::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 2px;
}
#q-panel::before { top: 0; background: linear-gradient(90deg, transparent, rgba(0,180,255,.7), transparent); }
#q-panel::after  { bottom: 0; background: linear-gradient(90deg, transparent, rgba(245,200,66,.5), transparent); }
#q-num {
  position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
  background: var(--gold2);
  color: #000;
  font-family: 'Cinzel', serif;
  font-size: 11px; font-weight: 700;
  padding: 3px 16px;
  border-radius: 999px;
  letter-spacing: .12em;
}
#q-text {
  font-family: 'Cinzel', serif;
  font-size: 17px;
  font-weight: 600;
  line-height: 1.55;
  text-align: center;
  color: var(--white);
  text-shadow: 0 1px 8px rgba(0,80,255,.4);
}

/* ── Options grid ── */
#opts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
}
.opt {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 18px;
  border-radius: 10px;
  border: 1.5px solid rgba(0,130,255,.45);
  background: linear-gradient(135deg, rgba(0,50,140,.7), rgba(0,25,80,.85));
  cursor: pointer;
  transition: all .18s;
  position: relative;
  overflow: hidden;
  min-height: 64px;
}
.opt::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(245,200,66,.12), transparent);
  opacity: 0;
  transition: opacity .2s;
}
.opt:hover:not(.disabled)::before { opacity: 1; }
.opt:hover:not(.disabled) {
  border-color: rgba(245,200,66,.7);
  box-shadow: 0 0 18px rgba(245,200,66,.2);
  transform: translateY(-1px);
}
.opt.disabled { cursor: default; }
.opt-letter {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid rgba(245,200,66,.6);
  background: radial-gradient(circle, rgba(245,200,66,.18), rgba(0,0,0,0));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 14px; font-weight: 700;
  color: var(--gold);
  flex-shrink: 0;
  transition: all .25s;
}
.opt-text { font-size: 14px; font-weight: 600; line-height: 1.35; color: #d0e4ff; flex: 1; }

/* Option states */
.opt.highlight {
  border-color: rgba(245,200,66,.9);
  background: linear-gradient(135deg, rgba(80,60,0,.8), rgba(40,30,0,.9));
  animation: optGlow 1s ease-in-out infinite alternate;
}
@keyframes optGlow {
  from { box-shadow: 0 0 8px rgba(245,200,66,.3); }
  to   { box-shadow: 0 0 28px rgba(245,200,66,.7); }
}
.opt.correct-reveal {
  border-color: var(--correct);
  background: linear-gradient(135deg, rgba(0,80,40,.8), rgba(0,40,20,.9));
  animation: correctFlash .4s ease;
}
.opt.correct-reveal .opt-letter {
  background: var(--correct); border-color: var(--correct); color: #000;
}
@keyframes correctFlash {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.03); }
}
.opt.wrong-reveal {
  border-color: var(--wrong);
  background: linear-gradient(135deg, rgba(80,0,0,.8), rgba(40,0,0,.9));
}
.opt.wrong-reveal .opt-letter {
  background: var(--wrong); border-color: var(--wrong); color: #fff;
}
.opt.removed {
  opacity: .18;
  pointer-events: none;
}
.opt.dimmed { opacity: .35; }

/* ── Progress bar ── */
#prog-wrap {
  width: 100%;
  display: flex; align-items: center; gap: 12px;
  margin-top: 14px;
}
#prog-bar {
  flex: 1; height: 5px;
  background: rgba(255,255,255,.08);
  border-radius: 999px;
  overflow: hidden;
}
#prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #00aaff, #f5c842);
  border-radius: 999px;
  transition: width .6s ease;
}
#prog-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: .08em; white-space: nowrap; }

/* ── Right sidebar ── */
#sidebar {
  width: 160px;
  display: flex; flex-direction: column;
  padding: 12px 8px;
  gap: 10px;
  border-left: 1px solid rgba(0,100,255,.15);
}
#prize-now {
  background: linear-gradient(135deg, rgba(40,30,0,.8), rgba(20,14,0,.9));
  border: 1px solid rgba(245,200,66,.5);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
#prize-now .pn-label { font-size: 9px; color: var(--muted); font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
#prize-now .pn-amount { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 900; color: var(--gold); margin-top: 4px; }
#safe-harbor {
  background: rgba(0,40,100,.5);
  border: 1px solid rgba(0,130,255,.3);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}
#safe-harbor .sh-label { font-size: 9px; color: var(--muted); font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }
#safe-harbor .sh-amount { font-size: 14px; font-weight: 700; color: #60a0ff; margin-top: 3px; }
#audience-chart {
  background: rgba(0,20,60,.6);
  border: 1px solid rgba(0,100,200,.3);
  border-radius: 10px;
  padding: 10px;
  display: none;
}
#audience-chart .ac-title { font-size: 9px; color: var(--muted); font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.ac-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.ac-letter { font-size: 10px; font-weight: 700; color: var(--gold); width: 12px; }
.ac-bar-wrap { flex: 1; height: 12px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
.ac-bar { height: 100%; border-radius: 3px; transition: width 1.2s ease; }
.ac-pct { font-size: 10px; font-weight: 700; color: var(--white); width: 28px; text-align: right; }

/* ══ OVERLAY SCREENS ══ */
#overlay {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.8);
  backdrop-filter: blur(6px);
}
#overlay.hidden { display: none; }
.ov-card {
  background: radial-gradient(ellipse at 50% 0%, rgba(0,60,180,.5), rgba(4,8,18,.95));
  border: 2px solid rgba(0,150,255,.5);
  border-radius: 20px;
  padding: 48px 52px;
  text-align: center;
  max-width: 560px;
  width: 90%;
  position: relative;
  box-shadow: 0 0 60px rgba(0,100,255,.3), inset 0 1px 0 rgba(255,255,255,.07);
  animation: cardIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes cardIn {
  from { transform: scale(.7) translateY(40px); opacity: 0; }
  to   { transform: scale(1) translateY(0);    opacity: 1; }
}
.ov-card::before, .ov-card::after {
  content: ''; position: absolute; left: 0; right: 0; height: 2px;
}
.ov-card::before { top: 0; background: linear-gradient(90deg,transparent,rgba(0,180,255,.8),transparent); }
.ov-card::after  { bottom: 0; background: linear-gradient(90deg,transparent,rgba(245,200,66,.6),transparent); }
.ov-icon { font-size: 60px; margin-bottom: 16px; display: block; }
.ov-title {
  font-family: 'Cinzel', serif; font-size: 28px; font-weight: 900;
  margin-bottom: 10px; color: var(--gold);
  text-shadow: 0 0 30px rgba(245,200,66,.6);
}
.ov-sub { font-size: 14px; color: #7aa0c0; line-height: 1.7; margin-bottom: 24px; }
.ov-prize {
  font-family: 'Cinzel', serif; font-size: 38px; font-weight: 900;
  color: var(--gold); margin: 10px 0 24px;
  text-shadow: 0 0 40px rgba(245,200,66,.7), 0 0 80px rgba(245,200,66,.3);
  animation: prizePulse 1.5s ease-in-out infinite;
}
@keyframes prizePulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.ov-btn {
  background: linear-gradient(135deg, rgba(245,200,66,.2), rgba(245,200,66,.08));
  border: 2px solid rgba(245,200,66,.7);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: .14em;
  padding: 13px 36px;
  border-radius: 8px;
  cursor: pointer;
  transition: all .22s;
  margin: 4px;
}
.ov-btn:hover { background: rgba(245,200,66,.25); box-shadow: 0 0 20px rgba(245,200,66,.3); }
.ov-btn.blue {
  border-color: rgba(0,180,255,.7); color: #00d4ff;
  background: linear-gradient(135deg,rgba(0,180,255,.15),rgba(0,180,255,.05));
}
.ov-btn.blue:hover { background: rgba(0,180,255,.2); box-shadow: 0 0 20px rgba(0,180,255,.25); }

/* ── Phone dialog ── */
#phone-dialog {
  position: fixed; inset: 0; z-index: 101;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.85);
  display: none;
}
#phone-card {
  background: #0a1628;
  border: 2px solid rgba(0,200,120,.5);
  border-radius: 16px;
  padding: 32px 36px;
  max-width: 480px; width: 90%;
  animation: cardIn .4s ease;
}
#phone-card h3 { font-family:'Cinzel',serif; font-size:16px; color:#00e676; margin-bottom:14px; }
#phone-text { font-size:14px; line-height:1.75; color:#aaccee; }
.phone-close {
  margin-top: 20px;
  background: rgba(0,200,120,.15); border: 1px solid rgba(0,200,120,.4);
  color: #00e676; font-size: 12px; font-weight: 700; letter-spacing: .1em;
  padding: 10px 28px; border-radius: 8px; cursor: pointer; transition: .2s;
}
.phone-close:hover { background: rgba(0,200,120,.25); }

/* ── Animations ── */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* ── Confetti canvas ── */
#confetti { position:fixed;inset:0;z-index:99;pointer-events:none; }

/* ── Final Answer confirm ── */
#final-confirm {
  position: fixed; inset: 0; z-index: 102;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 40px;
  pointer-events: none;
}
#final-confirm.show { pointer-events: all; }
#fc-bar {
  background: linear-gradient(135deg, rgba(10,20,50,.97), rgba(5,10,30,.97));
  border: 1.5px solid rgba(245,200,66,.5);
  border-radius: 12px;
  padding: 14px 28px;
  display: flex; align-items: center; gap: 20px;
  transform: translateY(100px);
  opacity: 0;
  transition: all .35s cubic-bezier(.34,1.56,.64,1);
  font-size: 13px;
}
#final-confirm.show #fc-bar { transform: translateY(0); opacity: 1; }
#fc-txt { color: var(--white); font-weight: 600; }
#fc-txt span { color: var(--gold); font-family:'Cinzel',serif; font-weight:700; }
.fc-btn {
  padding: 9px 22px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; letter-spacing: .08em; border: 1.5px solid; transition: .2s;
}
.fc-yes { background: rgba(245,200,66,.15); border-color: rgba(245,200,66,.6); color: var(--gold); }
.fc-yes:hover { background: rgba(245,200,66,.28); }
.fc-no  { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.2); color: #7090b0; }
.fc-no:hover  { border-color: rgba(255,255,255,.4); color: var(--white); }

/* ── Walk away ── */
#walk-btn {
  margin-top: 10px;
  background: transparent; border: 1px solid rgba(255,255,255,.15);
  color: #4a6080; font-size: 11px; font-weight: 600; letter-spacing: .08em;
  padding: 7px 18px; border-radius: 6px; cursor: pointer; transition: .2s;
}
#walk-btn:hover { border-color: rgba(255,255,255,.3); color: #8090a0; }
</style>
</head>
<body>
<div id="starfield"><canvas id="star-canvas"></canvas></div>
<canvas id="confetti"></canvas>

<div id="game">
  <!-- Left ladder -->
  <div id="ladder"></div>

  <!-- Center -->
  <div id="stage">
    <div id="topbar">
      <div id="show-title">¿QUIÉN QUIERE SER ANALISTA?</div>
      <div id="lifelines">
        <div class="lifeline" id="ll-5050" onclick="use5050()">
          <div class="ll-icon">50:50</div>
          <div class="ll-label">Mitad</div>
        </div>
        <div class="lifeline" id="ll-phone" onclick="usePhone()">
          <div class="ll-icon">📞</div>
          <div class="ll-label">Llamar</div>
        </div>
        <div class="lifeline" id="ll-audience" onclick="useAudience()">
          <div class="ll-icon">👥</div>
          <div class="ll-label">Público</div>
        </div>
      </div>
    </div>

    <div id="q-panel">
      <div id="q-num">PREGUNTA 1 DE 12</div>
      <div id="q-text">Cargando pregunta...</div>
    </div>

    <div id="opts">
      <div class="opt" id="opt-A" onclick="selectOpt(0)">
        <div class="opt-letter">A</div>
        <div class="opt-text" id="txt-A"></div>
      </div>
      <div class="opt" id="opt-B" onclick="selectOpt(1)">
        <div class="opt-letter">B</div>
        <div class="opt-text" id="txt-B"></div>
      </div>
      <div class="opt" id="opt-C" onclick="selectOpt(2)">
        <div class="opt-letter">C</div>
        <div class="opt-text" id="txt-C"></div>
      </div>
      <div class="opt" id="opt-D" onclick="selectOpt(3)">
        <div class="opt-letter">D</div>
        <div class="opt-text" id="txt-D"></div>
      </div>
    </div>

    <div id="prog-wrap">
      <div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>
      <div id="prog-label">0 / 12</div>
    </div>

    <button id="walk-btn" onclick="walkAway()">💼 Retirarme con lo ganado</button>
  </div>

  <!-- Right sidebar -->
  <div id="sidebar">
    <div id="prize-now">
      <div class="pn-label">Premio actual</div>
      <div class="pn-amount" id="cur-prize">$0</div>
    </div>
    <div id="safe-harbor">
      <div class="sh-label">Puerto seguro</div>
      <div class="sh-amount" id="safe-amount">$0</div>
    </div>
    <div id="audience-chart">
      <div class="ac-title">👥 Respuesta del público</div>
      <div class="ac-row"><span class="ac-letter">A</span><div class="ac-bar-wrap"><div class="ac-bar" id="ab-A" style="width:0;background:#3b82f6"></div></div><span class="ac-pct" id="ap-A">0%</span></div>
      <div class="ac-row"><span class="ac-letter">B</span><div class="ac-bar-wrap"><div class="ac-bar" id="ab-B" style="width:0;background:#10b981"></div></div><span class="ac-pct" id="ap-B">0%</span></div>
      <div class="ac-row"><span class="ac-letter">C</span><div class="ac-bar-wrap"><div class="ac-bar" id="ab-C" style="width:0;background:#f59e0b"></div></div><span class="ac-pct" id="ap-C">0%</span></div>
      <div class="ac-row"><span class="ac-letter">D</span><div class="ac-bar-wrap"><div class="ac-bar" id="ab-D" style="width:0;background:#ec4899"></div></div><span class="ac-pct" id="ap-D">0%</span></div>
    </div>
  </div>
</div>

<!-- Final answer confirm -->
<div id="final-confirm">
  <div id="fc-bar">
    <div id="fc-txt">¿Es tu respuesta final? <span id="fc-chosen"></span></div>
    <button class="fc-btn fc-yes" onclick="confirmAnswer()">✓ Respuesta Final</button>
    <button class="fc-btn fc-no"  onclick="cancelAnswer()">✗ Cambiar</button>
  </div>
</div>

<!-- Phone dialog -->
<div id="phone-dialog">
  <div id="phone-card">
    <h3>📞 Tu amigo el Experto habla...</h3>
    <div id="phone-text"></div>
    <button class="phone-close" onclick="closePhone()">Colgar</button>
  </div>
</div>

<!-- Overlay -->
<div id="overlay" class="hidden">
  <div class="ov-card" id="ov-card"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   WEB AUDIO ENGINE
═══════════════════════════════════════════════════════ */
const AC = new (window.AudioContext || window.webkitAudioContext)();

function resumeAC(){ if(AC.state==='suspended') AC.resume(); }

function playTone(freq, type='sine', dur=0.3, vol=0.18, delay=0){
  resumeAC();
  const osc=AC.createOscillator(), gain=AC.createGain();
  osc.connect(gain); gain.connect(AC.destination);
  osc.type=type; osc.frequency.setValueAtTime(freq,AC.currentTime+delay);
  gain.gain.setValueAtTime(0,AC.currentTime+delay);
  gain.gain.linearRampToValueAtTime(vol,AC.currentTime+delay+0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+delay+dur);
  osc.start(AC.currentTime+delay); osc.stop(AC.currentTime+delay+dur+0.05);
}

function playChord(freqs, type='triangle', dur=0.5, vol=0.12){
  freqs.forEach(f=>playTone(f,type,dur,vol));
}

(function(){
  const c=document.getElementById('star-canvas');
  const cx=c.getContext('2d');
  function resize(){ c.width=window.innerWidth; c.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  const stars=Array.from({length:180},()=>({
    x:Math.random()*c.width, y:Math.random()*c.height,
    r:.4+Math.random()*1.4, s:.2+Math.random()*.6,
    t:Math.random()*Math.PI*2
  }));
  function frame(){
    cx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.t+=.008*s.s;
      const a=.35+Math.sin(s.t)*.35;
      cx.globalAlpha=a; cx.fillStyle='#ffffff';
      cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fill();
    });
    cx.globalAlpha=1;
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ═══════════════════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════════════════ */
const confCanvas=document.getElementById('confetti');
const confCtx=confCanvas.getContext('2d');
confCanvas.width=window.innerWidth; confCanvas.height=window.innerHeight;
window.addEventListener('resize',()=>{ confCanvas.width=window.innerWidth; confCanvas.height=window.innerHeight; });
let confetti=[], confActive=false;
function launchConfetti(){
  confActive=true;
  confetti=Array.from({length:160},()=>({
    x:Math.random()*confCanvas.width, y:-20,
    vx:(Math.random()-0.5)*6, vy:2+Math.random()*5,
    r:5+Math.random()*6, c:['#f5c842','#00d4ff','#ff3d3d','#00e676','#a855f7','#ff8c00'][Math.floor(Math.random()*6)],
    rot:Math.random()*360, rotV:(Math.random()-0.5)*8
  }));
  function draw(){
    if(!confActive){confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);return;}
    confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
    confetti.forEach(p=>{
      p.y+=p.vy; p.x+=p.vx; p.vy+=0.08; p.rot+=p.rotV;
      confCtx.save(); confCtx.translate(p.x,p.y); confCtx.rotate(p.rot*Math.PI/180);
      confCtx.fillStyle=p.c; confCtx.fillRect(-p.r/2,-p.r/2,p.r,p.r); confCtx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
  setTimeout(()=>{ confActive=false; },5000);
}

function buildLadder(){
  const el=document.getElementById('ladder');
  el.innerHTML='';
  PRIZES.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='lrung'+(MILESTONES.includes(i)?' milestone':'');
    d.id='rung-'+i;
    d.innerHTML=`<span class="lnum">${i+1}</span><span class="lval">${p}</span>`;
    el.appendChild(d);
  });
  updateLadder();
}

function updateLadder(){
  PRIZES.forEach((_,i)=>{
    const el=document.getElementById('rung-'+i);
    if(!el)return;
    el.classList.remove('active','passed');
    if(i===G.q)    el.classList.add('active');
    else if(i<G.q) el.classList.add('passed');
  });
  // Update prizes in sidebar
  document.getElementById('cur-prize').textContent = G.q>0 ? PRIZES[G.q-1] : '$0';
  const si=G.q>0?SAFE[G.q-1]:0;
  document.getElementById('safe-amount').textContent = si>0?PRIZES[si-1]:'$0';
}

function loadQuestion(){

/* ═══════════════════════════════════════════════════════
   SELECT OPTION
═══════════════════════════════════════════════════════ */
function selectOpt(idx){
  resumeAC();
  if(G.answered || G.removed.includes(idx)) return;

  // Clear previous selection
  ['A','B','C','D'].forEach((l,i)=>{
    const el=document.getElementById('opt-'+l);
    el.classList.remove('highlight');
    if(!G.removed.includes(i)) el.className='opt';
  });

  G.selected=idx;
  const letters=['A','B','C','D'];
  document.getElementById('opt-'+letters[idx]).classList.add('highlight');
  sndHighlight();

  // Show confirm bar
  G.confirmOpen=true;
  document.getElementById('fc-chosen').textContent=`"${letters[idx]}: ${QUESTIONS[G.q].opts[idx].substring(0,40)}${QUESTIONS[G.q].opts[idx].length>40?'…':''}"`;
  document.getElementById('final-confirm').classList.add('show');
}

function cancelAnswer(){
  G.confirmOpen=false;
  const letters=['A','B','C','D'];
  document.getElementById('opt-'+letters[G.selected]).classList.remove('highlight');
  G.selected=-1;
  hideConfirm();
  sndTick();
}

function confirmAnswer(){
  if(G.selected===-1) return;
  hideConfirm();
  G.confirmOpen=false;
  G.answered=true;
  sndFinalAnswer();

  // Disable all options
  ['A','B','C','D'].forEach(l=>document.getElementById('opt-'+l).classList.add('disabled'));
  document.getElementById('walk-btn').disabled=true;

  // Dramatic highlight sequence
  const q=QUESTIONS[G.q];
  const letters=['A','B','C','D'];
  let flashes=0, maxFlash=7;
  const flashSeq=()=>{
    if(flashes>=maxFlash){
      // Reveal
      document.getElementById('opt-'+letters[G.selected]).classList.remove('highlight');
      const correct=G.selected===q.ci;
      document.getElementById('opt-'+letters[q.ci]).classList.add('correct-reveal');
      if(!correct){
        document.getElementById('opt-'+letters[G.selected]).classList.add('wrong-reveal');
        sndWrong();
        setTimeout(()=>showWrong(),1800);
      } else {
        sndCorrect();
        if(MILESTONES.includes(G.q)) sndMilestone();
        G.score=G.q+1;
        G.safeScore=SAFE[G.q]>0?SAFE[G.q]:G.safeScore;
        setTimeout(()=>showCorrect(),2000);
      }
      return;
    }
    sndThink();
    // Flash highlight on/off + cycle through options dramatically
    const showIdx=flashes%2===0?G.selected:Math.floor(Math.random()*4);
    ['A','B','C','D'].forEach((l,i)=>{
      const el=document.getElementById('opt-'+l);
      if(!G.removed.includes(i)) el.classList.remove('highlight');
    });
    document.getElementById('opt-'+letters[showIdx]).classList.add('highlight');
    flashes++;
    setTimeout(flashSeq, 300+flashes*40);
  };
  setTimeout(flashSeq, 400);
}

  const pcts=[0,0,0,0];
  let remaining=100;
  // Correct answer: 40-75% based on difficulty
  const diffBonus=G.q>7?-15:G.q>4?0:15;
  const correctPct=Math.min(75,Math.max(35,40+diffBonus+Math.floor(Math.random()*20)));
  pcts[q.ci]=correctPct; remaining-=correctPct;
  // Distribute rest
  const others=[0,1,2,3].filter(i=>i!==q.ci&&!G.removed.includes(i));
  others.forEach((idx,i)=>{
    const share=i===others.length-1?remaining:Math.floor(remaining/(others.length-i)*(.5+Math.random()));
    pcts[idx]=share; remaining-=share;
  });

  // Show chart
  const chart=document.getElementById('audience-chart');
  chart.style.display='block';
  const letters=['A','B','C','D'];
  setTimeout(()=>{
    letters.forEach((l,i)=>{
      document.getElementById('ab-'+l).style.width=pcts[i]+'%';
      document.getElementById('ap-'+l).textContent=pcts[i]+'%';
    });
  },200);

  // Audience murmur sound
  [440,494,523,440,392].forEach((f,i)=>playTone(f,'sine',.15,.06,i*.12));
}

/* ═══════════════════════════════════════════════════════
   WALK AWAY
═══════════════════════════════════════════════════════ */
function walkAway(){
  resumeAC();
  if(G.q===0){ return; }
  sndWalkaway();
  const prize=PRIZES[G.q-1];
  showOverlay({
    icon:'💼',
    title:'¡TE RETIRAS!',
    sub:'Tomaste la decisión sabia. El conocimiento ganado vale más que el dinero en juego.',
    prize,
    btns:[
      {label:'↺ Jugar de Nuevo',fn:'resetGame()'},
    ]
  });
}

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function hideConfirm(){
  document.getElementById('final-confirm').classList.remove('show');
}

/* ═══════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════ */
function resetGame(){
  document.getElementById('overlay').classList.add('hidden');
  confActive=false;
  G={ q:0, selected:-1, answered:false, used5050:false, usedPhone:false, usedAudience:false, removed:[], highlightTimer:null, confirmOpen:false, score:0, safeScore:0 };
  ['5050','phone','audience'].forEach(l=>document.getElementById('ll-'+l).classList.remove('used'));
  document.getElementById('walk-btn').disabled=false;
  buildLadder();
  loadQuestion();
}

/* ═══════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════════════ */
window.addEventListener('keydown', e=>{
  if(G.answered) return;
  const map={'a':0,'b':1,'c':2,'d':3,'1':0,'2':1,'3':2,'4':3};
  const k=e.key.toLowerCase();
  if(k in map && !G.removed.includes(map[k])) selectOpt(map[k]);
  if(k==='enter' && G.selected!==-1 && G.confirmOpen) confirmAnswer();
  if(k==='escape' && G.confirmOpen) cancelAnswer();
});

/* ═══════════════════════════════════════════════════════
   SHOW INTRO THEN START
═══════════════════════════════════════════════════════ */
function showIntro(){
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('ov-card').innerHTML=`
    <span class="ov-icon">🎓</span>
    <div class="ov-title">¿QUIÉN QUIERE SER ANALISTA?</div>
    <div class="ov-sub">
      12 preguntas sobre <strong style="color:#f5c842">Técnicas de Elicitación de Requisitos</strong>.<br>
      Tienes 3 comodines: <strong>50:50</strong>, <strong>📞 Llamar a un experto</strong> y <strong>👥 Preguntar al público</strong>.<br>
      Puedes retirarte en cualquier momento con lo ganado.<br>
      <br>
      <span style="color:#00d4ff">A · B · C · D</span> para elegir — <span style="color:#f5c842">Enter</span> para confirmar.
    </div>
    <button class="ov-btn" onclick="startGame()">▶ COMENZAR</button>
  `;
}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  buildLadder();
  loadQuestion();
}

showIntro();
