* { margin:0; padding:0; box-sizing:border-box; }
html,body {

}
#wrapper {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  width:100%; height:100%;
  gap:0;
}
#topbar {
  width:820px; max-width:99vw;
  background:#111520;
  border:1px solid #1e2a38;
  border-bottom:none;
  border-radius:10px 10px 0 0;
  padding:6px 12px;
  display:flex; align-items:center; gap:16px;
  flex-wrap:wrap;
}
.tb-item { display:flex; align-items:center; gap:6px; }
.tb-label { font-size:9px; color:#4a6080; letter-spacing:.15em; text-transform:uppercase; }
.tb-val { font-size:13px; font-weight:bold; }
#tb-xp { color:#ffc642; }
#tb-lives-wrap { display:flex; gap:3px; }
.life-icon { font-size:14px; transition:.3s; }
.life-icon.dead { opacity:.2; filter:grayscale(1); }
#tb-score { color:#00e5ff; }
#tb-level { color:#a78bfa; }
#tb-hint {
  margin-left:auto;
  font-size:9px; color:#2a4060;
  letter-spacing:.1em;
}
#game-canvas {
  display:block;
  /* CSS width stays logical — physical buffer is DPR x larger */
  border:1px solid #1e2a38;
}
#controls-bar {
  width:820px; max-width:99vw;
  background:#0d1117;
  border:1px solid #1e2a38;
  border-top:none;
  border-radius:0 0 10px 10px;
  padding:5px 12px;
  display:flex; gap:16px; align-items:center; flex-wrap:wrap;
}
.ctrl { display:flex; align-items:center; gap:5px; }
.key {
  background:#1a2535;
  border:1px solid #2a3a4f;
  border-bottom:2px solid #0a1020;
  border-radius:4px;
  padding:2px 6px;
  font-size:10px; color:#7aa0c0;
  font-family:-apple-system,'Segoe UI',sans-serif;
  letter-spacing:.05em;
}
.ctrl-desc { font-size:9px; color:#3a5070; letter-spacing:.08em; }

/* Screens overlay on canvas */
#overlay {
  position:absolute;
  width:800px; max-width:98vw;
  pointer-events:none;
}
#canvas-wrap {
  position:relative;
  display:flex; justify-content:center;
}
</style>
</head>

/* ═══════════════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════════════ */
let state = {
  // Player
  px: 7.5 * T, py: 6.5 * T,   // pixel position (center)
  facing: 'down',
  vx: 0, vy: 0,
  speed: 2.2,
  sprint: false,
  animFrame: 0,
  animTick: 0,
  footStep: 0,

  // Camera
  camX: 0, camY: 0,

  // Input
  keys: {},

  // Progress
  xp: 0,
  lives: 3,
  maxLives: 3,
  completed: new Set(),
  correct: 0,

  // Dialog
  dialogActive: false,
  dialogNpc: null,
  dialogPhase: 'question', // 'question','feedback','none'
  dialogChoice: -1,
  dialogCorrect: false,
  dialogText: '',
  dialogTextPos: 0,
  dialogTextTimer: 0,

  // Nearby
  nearbyNpc: null,

  // Screen
  screen: 'intro',  // 'intro','game','win','dead'

  // UI
  showMinimap: false,
  particles: [],
  footParticles: [],
  flashTimer: 0,
  flashColor: '',
  roomLabel: '',
  roomLabelTimer: 0,
  lastRoom: -1,

  // Time
  tick: 0,
};

/* ═══════════════════════════════════════════════════════
   LEVELS
═══════════════════════════════════════════════════════ */
const LEVELS = [
  { min:0,   label:'Trainee',     color:'#4a6080' },
  { min:100, label:'Junior',      color:'#27ae60' },
  { min:250, label:'Analista',    color:'#00e5ff' },
  { min:400, label:'Senior',      color:'#a78bfa' },
  { min:560, label:'Experto',     color:'#ffc642' },
];
function getLevel(xp) {
  for (let i = LEVELS.length-1; i >= 0; i--)
    if (xp >= LEVELS[i].min) return LEVELS[i];
  return LEVELS[0];
}

/* ═══════════════════════════════════════════════════════
   TILE HELPERS
═══════════════════════════════════════════════════════ */
function getTile(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= MAP_COLS || ty >= MAP_ROWS) return 1;
  return M[ty][tx];
}
function isWall(tx, ty) { return getTile(tx, ty) === 1; }
function isWalkable(tx, ty) { return !isWall(tx, ty); }

/* pixel → tile */
function ptx(px) { return Math.floor(px / T); }
function pty(py) { return Math.floor(py / T); }

/* collision: check 4 corners of player */
const PLAYER_R = 10; // player hitbox radius in pixels
function canMove(nx, ny) {
  const corners = [
    [nx - PLAYER_R, ny - PLAYER_R],
    [nx + PLAYER_R, ny - PLAYER_R],
    [nx - PLAYER_R, ny + PLAYER_R],
    [nx + PLAYER_R, ny + PLAYER_R],
  ];
  return corners.every(([cx, cy]) => isWalkable(ptx(cx), pty(cy)));
}

/* ═══════════════════════════════════════════════════════
   INPUT
═══════════════════════════════════════════════════════ */
window.addEventListener('keydown', e => {
  state.keys[e.key.toLowerCase()] = true;
  state.keys[e.code] = true;

  if (e.key === 'Escape') {
    if (state.screen === 'game') { state.screen = 'intro'; }
    else if (state.screen === 'intro') {}
  }

  if (e.key.toLowerCase() === 'm' && state.screen === 'game' && !state.dialogActive) {
    state.showMinimap = !state.showMinimap;
  }

  if ((e.key.toLowerCase() === 'e' || e.key === ' ') && state.screen === 'game') {
    e.preventDefault();
    if (state.dialogActive) {
      if (state.dialogPhase === 'feedback') {
        state.dialogActive = false;
        state.dialogPhase = 'none';
      }
    } else if (state.nearbyNpc && !state.completed.has(state.nearbyNpc.id)) {
      openDialog(state.nearbyNpc);
    } else if (state.nearbyNpc && state.completed.has(state.nearbyNpc.id)) {
      // Show "ya completado" briefly
    }
  }

  // Number keys for dialog choices
  if (state.dialogActive && state.dialogPhase === 'question') {
    if (['1','2','3','4'].includes(e.key)) {
      const idx = parseInt(e.key) - 1;
      selectChoice(idx);
    }
  }

  e.preventDefault && ['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) && e.preventDefault();
});

window.addEventListener('keyup', e => {
  state.keys[e.key.toLowerCase()] = false;
  state.keys[e.code] = false;
});

/* ═══════════════════════════════════════════════════════
   DIALOG SYSTEM
═══════════════════════════════════════════════════════ */
function openDialog(npc) {
  state.dialogActive = true;
  state.dialogNpc    = npc;
  state.dialogPhase  = 'question';
  state.dialogChoice = -1;
  state.vx = 0; state.vy = 0;
}

function selectChoice(idx) {
  if (state.dialogChoice !== -1) return;
  const npc = state.dialogNpc;
  state.dialogChoice  = idx;
  state.dialogCorrect = (idx === npc.correctIdx);
  state.dialogPhase   = 'feedback';
  state.completed.add(npc.id);

  if (state.dialogCorrect) {
    state.xp     += npc.xp;
    state.correct++;
    state.flashColor = 'rgba(0,229,255,0.25)';
    spawnParticles(state.px, state.py, '#00e5ff', 20);
    spawnParticles(state.px, state.py, '#ffc642', 10);
  } else {
    state.lives = Math.max(0, state.lives - 1);
    state.flashColor = 'rgba(255,80,80,0.3)';
    spawnParticles(state.px, state.py, '#ff4444', 15);
    if (state.lives === 0) {
      setTimeout(() => { state.screen = 'dead'; state.dialogActive = false; }, 2500);
    }
  }
  state.flashTimer = 30;
  updateHUD();

  // Check win
  if (state.correct === NPCS.length) {
    setTimeout(() => { state.screen = 'win'; state.dialogActive = false; }, 2500);
  }
}

/* ═══════════════════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════════════════ */
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3.5;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      color,
      life: 1,
      size: 2 + Math.random() * 3,
    });
  }
}

function spawnFootParticle(x, y) {
  state.footParticles.push({
    x, y: y + 10,
    vx: (Math.random() - 0.5) * 0.5,
    vy: -0.3 - Math.random() * 0.3,
    life: 0.6,
    size: 2 + Math.random() * 2,
  });
}

/* ═══════════════════════════════════════════════════════
   UPDATE
═══════════════════════════════════════════════════════ */
function update() {
  state.tick++;

  if (state.screen !== 'game' || state.dialogActive) {
    updateParticles();
    return;
  }

  // Sprint
  state.sprint = state.keys['shift'] || state.keys['ShiftLeft'] || state.keys['ShiftRight'];
  const spd = state.sprint ? state.speed * 1.8 : state.speed;

  // Movement
  let dx = 0, dy = 0;
  if (state.keys['w'] || state.keys['arrowup']    || state.keys['KeyW']) dy -= 1;
  if (state.keys['s'] || state.keys['arrowdown']  || state.keys['KeyS']) dy += 1;
  if (state.keys['a'] || state.keys['arrowleft']  || state.keys['KeyA']) dx -= 1;
  if (state.keys['d'] || state.keys['arrowright'] || state.keys['KeyD']) dx += 1;

  // Normalize diagonal
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  if (dx !== 0 || dy !== 0) {
    // Facing direction
    if      (Math.abs(dy) > Math.abs(dx)) state.facing = dy > 0 ? 'down' : 'up';
    else if (dx !== 0)                    state.facing = dx > 0 ? 'right' : 'left';

    // Move X
    const nx = state.px + dx * spd;
    if (canMove(nx, state.py)) state.px = nx;

    // Move Y
    const ny = state.py + dy * spd;
    if (canMove(state.px, ny)) state.py = ny;

    // Walk animation
    state.animTick++;
    if (state.animTick % (state.sprint ? 5 : 9) === 0) {
      state.animFrame = (state.animFrame + 1) % 4;
      state.footStep++;
      if (state.footStep % 2 === 0) spawnFootParticle(state.px, state.py);
    }
  }

  // Camera
  const targetCX = state.px - CW / 2;
  const targetCY = state.py - CH / 2;
  const worldW = MAP_COLS * T;
  const worldH = MAP_ROWS * T;
  state.camX += (targetCX - state.camX) * 0.12;
  state.camY += (targetCY - state.camY) * 0.12;
  state.camX = Math.max(0, Math.min(worldW - CW, state.camX));
  state.camY = Math.max(0, Math.min(worldH - CH, state.camY));

  // Nearby NPC detection
  state.nearbyNpc = null;
  const ptxP = ptx(state.px), ptyP = pty(state.py);
  for (const npc of NPCS) {
    const dist = Math.hypot(state.px - (npc.tx + 0.5) * T, state.py - (npc.ty + 0.5) * T);
    if (dist < T * 1.8) { state.nearbyNpc = npc; break; }
  }

  // Room label detection
  const tileId = getTile(ptxP, ptyP);
  if (tileId >= 2 && tileId !== state.lastRoom) {
    state.lastRoom = tileId;
    state.roomLabel = ROOMS[tileId]?.label || '';
    state.roomLabelTimer = 180;
  }
  if (state.roomLabelTimer > 0) state.roomLabelTimer--;

  // Flash
  if (state.flashTimer > 0) state.flashTimer--;

  updateParticles();
}

function updateParticles() {
  state.particles = state.particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.025;
    return p.life > 0;
  });
  state.footParticles = state.footParticles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= 0.045;
    return p.life > 0;
  });
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function render() {
  ctx.clearRect(0, 0, CW, CH);

  if (state.screen === 'intro') { drawIntro(); return; }
  if (state.screen === 'win')   { drawWin();   return; }
  if (state.screen === 'dead')  { drawDead();  return; }

  // ── WORLD ──
  ctx.save();
  ctx.translate(-Math.round(state.camX), -Math.round(state.camY));
  drawTiles();
  drawFurniture();
  drawFootParticles();
  drawNPCs();
  drawPlayer();
  drawParticles();
  ctx.restore();

  // ── HUD OVERLAYS ──
  drawFlash();
  if (state.dialogActive) drawDialog();
  else                    drawInteractPrompt();
  if (state.roomLabelTimer > 0) drawRoomLabel();
  if (state.showMinimap) drawMinimap();
}

/* ── TILES ──────────────────────────────────── */
function drawTiles() {
  const startCol = Math.max(0, Math.floor(state.camX / T) - 1);
  const endCol   = Math.min(MAP_COLS, Math.ceil((state.camX + CW) / T) + 1);
  const startRow = Math.max(0, Math.floor(state.camY / T) - 1);
  const endRow   = Math.min(MAP_ROWS, Math.ceil((state.camY + CH) / T) + 1);

  // ── PASS 1: Draw floor & corridors first ────────────
  for (let row = startRow; row < endRow; row++) {
    for (let col = startCol; col < endCol; col++) {
      const tile = M[row][col];
      const x = col * T, y = row * T;
      if (tile === 1) continue; // skip walls, drawn in pass 2

      if (tile === 0) {
        // Corridor — medium dark with subtle checkerboard
        const checker = (row + col) % 2 === 0;
        ctx.fillStyle = checker ? '#141e2c' : '#121b28';
        ctx.fillRect(x, y, T, T);
        // Thin inner inset to show tile boundary
        ctx.strokeStyle = '#0e1620';
        ctx.lineWidth = 0.6;
        ctx.strokeRect(x + 0.3, y + 0.3, T - 0.6, T - 0.6);
        ctx.lineWidth = 1;
      } else if (tile >= 2) {
        const room = ROOMS[tile];
        // Room floor with subtle tile pattern
        ctx.fillStyle = room.floor;
        ctx.fillRect(x, y, T, T);
        // Tile grout lines
        ctx.strokeStyle = room.color;
        ctx.lineWidth = 0.7;
        ctx.strokeRect(x + 0.35, y + 0.35, T - 0.7, T - 0.7);
        ctx.lineWidth = 1;
        // Tiny inner highlight to look like polished floor
        ctx.fillStyle = 'rgba(255,255,255,0.018)';
        ctx.fillRect(x + 2, y + 2, T * 0.45, T * 0.45);
      }
    }
  }

  // ── PASS 2: Cast wall shadows onto floor/corridor ────
  for (let row = startRow; row < endRow; row++) {
    for (let col = startCol; col < endCol; col++) {
      if (M[row][col] !== 1) continue;
      const x = col * T, y = row * T;
      // Shadow falls to the right
      if (col + 1 < MAP_COLS && M[row][col + 1] !== 1) {
        const gR = ctx.createLinearGradient(x + T, y, x + T + T * 0.5, y);
        gR.addColorStop(0, 'rgba(0,0,0,0.45)');
        gR.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gR;
        ctx.fillRect(x + T, y, T * 0.5, T);
      }
      // Shadow falls downward
      if (row + 1 < MAP_ROWS && M[row + 1][col] !== 1) {
        const gD = ctx.createLinearGradient(x, y + T, x, y + T + T * 0.4);
        gD.addColorStop(0, 'rgba(0,0,0,0.4)');
        gD.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gD;
        ctx.fillRect(x, y + T, T, T * 0.4);
      }
    }
  }

  // ── PASS 3: Room accent inner glow on walls ──────────
  for (let row = startRow; row < endRow; row++) {
    for (let col = startCol; col < endCol; col++) {
      const tile = M[row][col];
      if (tile < 2) continue;
      const room = ROOMS[tile];
      const x = col * T, y = row * T;
      // Left wall border → accent strip
      if (col > 0 && M[row][col - 1] === 1) {
        const gL = ctx.createLinearGradient(x, y, x + T * 0.18, y);
        gL.addColorStop(0, room.accent + '50');
        gL.addColorStop(1, 'transparent');
        ctx.fillStyle = gL;
        ctx.fillRect(x, y, T * 0.18, T);
      }
      // Top wall border → accent strip
      if (row > 0 && M[row - 1][col] === 1) {
        const gT = ctx.createLinearGradient(x, y, x, y + T * 0.18);
        gT.addColorStop(0, room.accent + '50');
        gT.addColorStop(1, 'transparent');
        ctx.fillStyle = gT;
        ctx.fillRect(x, y, T, T * 0.18);
      }
    }
  }

  // ── PASS 4: Draw walls with full 3D top-down style ──
  for (let row = startRow; row < endRow; row++) {
    for (let col = startCol; col < endCol; col++) {
      if (M[row][col] !== 1) continue;
      const x = col * T, y = row * T;

      // ── Body fill: stone-gray, clearly lighter than floor ──
      // Vary slightly by position for natural look
      const shade = ((col * 3 + row * 7) % 5) * 3;
      const rVal = 42 + shade, gVal = 52 + shade, bVal = 62 + shade;
      ctx.fillStyle = `rgb(${rVal},${gVal},${bVal})`;
      ctx.fillRect(x, y, T, T);

      // ── Top face: lighter strip at top of wall (3D illusion) ──
      const topH = T * 0.28;
      const gTop = ctx.createLinearGradient(x, y, x, y + topH);
      gTop.addColorStop(0, `rgb(${rVal + 28},${gVal + 32},${bVal + 36})`);
      gTop.addColorStop(1, `rgb(${rVal + 8},${gVal + 10},${bVal + 12})`);
      ctx.fillStyle = gTop;
      ctx.fillRect(x, y, T, topH);

      // ── Side edges: give each exposed face a lit/shadow look ──
      const wallRight = col + 1 < MAP_COLS && M[row][col + 1] === 1;
      const wallLeft  = col - 1 >= 0       && M[row][col - 1] === 1;
      const wallBelow = row + 1 < MAP_ROWS  && M[row + 1][col] === 1;
      const wallAbove = row - 1 >= 0        && M[row - 1][col] === 1;

      // Right edge lit highlight (light source from top-left)
      if (!wallRight) {
        const gRt = ctx.createLinearGradient(x + T - 4, y, x + T, y);
        gRt.addColorStop(0, 'rgba(255,255,255,0)');
        gRt.addColorStop(1, 'rgba(255,255,255,0.08)');
        ctx.fillStyle = gRt;
        ctx.fillRect(x + T - 4, y, 4, T);
      }
      // Bottom edge shadow
      if (!wallBelow) {
        const gBot = ctx.createLinearGradient(x, y + T - 6, x, y + T);
        gBot.addColorStop(0, 'rgba(0,0,0,0)');
        gBot.addColorStop(1, 'rgba(0,0,0,0.35)');
        ctx.fillStyle = gBot;
        ctx.fillRect(x, y + T - 6, T, 6);
      }
      // Left edge bright (facing light)
      if (!wallLeft) {
        const gLt = ctx.createLinearGradient(x, y, x + 5, y);
        gLt.addColorStop(0, 'rgba(255,255,255,0.12)');
        gLt.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gLt;
        ctx.fillRect(x, y, 5, T);
      }

      // ── Mortar lines: thin dark lines between wall blocks ──
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, T - 1, T - 1);
      ctx.lineWidth = 1;

      // ── Bright outline on any face that borders walkable ──
      // (makes the wall edge super clear)
      ctx.lineWidth = 1.5;
      // Top face exposed to walkable
      if (row > 0 && M[row - 1][col] !== 1) {
        ctx.strokeStyle = `rgba(${rVal + 40},${gVal + 45},${bVal + 50},0.9)`;
        ctx.beginPath(); ctx.moveTo(x, y + 0.75); ctx.lineTo(x + T, y + 0.75); ctx.stroke();
      }
      // Bottom face exposed to walkable
      if (row + 1 < MAP_ROWS && M[row + 1][col] !== 1) {
        ctx.strokeStyle = 'rgba(0,0,0,0.7)';
        ctx.beginPath(); ctx.moveTo(x, y + T - 0.75); ctx.lineTo(x + T, y + T - 0.75); ctx.stroke();
      }
      // Left face exposed to walkable
      if (col > 0 && M[row][col - 1] !== 1) {
        ctx.strokeStyle = `rgba(${rVal + 40},${gVal + 45},${bVal + 50},0.9)`;
        ctx.beginPath(); ctx.moveTo(x + 0.75, y); ctx.lineTo(x + 0.75, y + T); ctx.stroke();
      }
      // Right face exposed to walkable
      if (col + 1 < MAP_COLS && M[row][col + 1] !== 1) {
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath(); ctx.moveTo(x + T - 0.75, y); ctx.lineTo(x + T - 0.75, y + T); ctx.stroke();
      }
      ctx.lineWidth = 1;
    }
  }
}

/* ── FURNITURE ─────────────────────────────── */
function drawFurniture() {
  for (const f of FURNITURE) {
    const x = f.tx * T + 2, y = f.ty * T + 4;
    const w = f.w * T - 4,  h = f.h * T - 6;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x + 3, y + 3, w, h);
    // Body
    ctx.fillStyle = f.cd;
    ctx.fillRect(x, y, w, h);
    // Top face (isometric feel)
    ctx.fillStyle = f.cl;
    ctx.fillRect(x, y, w, Math.max(4, h * 0.3));
    // Edge highlight
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fillRect(x, y, w, 1);
    ctx.fillRect(x, y, 1, h);
  }
}

/* ── NPCs ──────────────────────────────────── */
function drawNPCs() {
  for (const npc of NPCS) {
    const wx = (npc.tx + 0.5) * T;
    const wy = (npc.ty + 0.5) * T;
    const done = state.completed.has(npc.id);
    const correct = done && state.correct > 0; // simplified

    // Bob animation
    const bob = Math.sin(state.tick * 0.05 + npc.id) * 2;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(wx, wy + 14, 9, 4, 0, 0, Math.PI*2);
    ctx.fill();

    // Body circle
    const bodyY = wy - 10 + bob;
    ctx.fillStyle = done ? '#1a2a1a' : '#1a2535';
    ctx.beginPath();
    ctx.arc(wx, bodyY, 14, 0, Math.PI*2);
    ctx.fill();

    // Color ring
    ctx.strokeStyle = done ? '#27ae60' : npc.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(wx, bodyY, 14, 0, Math.PI*2);
    ctx.stroke();
    ctx.lineWidth = 1;

    // Emoji
    ctx.font = '16px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(npc.emoji, wx, bodyY);

    // Done checkmark
    if (done) {
      ctx.fillStyle = '#27ae60';
      ctx.font = 'bold 12px -apple-system,system-ui,sans-serif';
      ctx.fillText('✓', wx + 10, bodyY - 10);
    }

    // "!" bubble when nearby and not done
    if (state.nearbyNpc?.id === npc.id && !done) {
      const bubbleY = bodyY - 22 + Math.sin(state.tick * 0.1) * 3;
      ctx.fillStyle = npc.color;
      ctx.beginPath();
      ctx.roundRect(wx - 8, bubbleY - 10, 16, 16, 4);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = 'bold 14px -apple-system,system-ui,sans-serif';
      ctx.fillText('!', wx, bubbleY - 2);
    }

    // Name tag
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(wx - 24, wy + 6, 48, 13);
    ctx.fillStyle = done ? '#27ae60' : '#a0b8d0';
    ctx.font = '10px -apple-system,system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(npc.name, wx, wy + 15);
  }
  ctx.textBaseline = 'alphabetic';
}

/* ── PLAYER ────────────────────────────────── */
function drawPlayer() {
  const px = state.px, py = state.py;
  const frame = state.animFrame;
  const isMoving = (state.vx !== 0 || state.vy !== 0) || 
    state.keys['w'] || state.keys['s'] || state.keys['a'] || state.keys['d'] ||
    state.keys['arrowup'] || state.keys['arrowdown'] || state.keys['arrowleft'] || state.keys['arrowright'];

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(px, py + 12, 10, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Legs (pixel style, animated)
  const legAnim = isMoving ? Math.sin(frame * Math.PI / 2) * 4 : 0;
  ctx.fillStyle = '#2a3f5a';
  ctx.fillRect(px - 5, py + 2, 4, 8 + legAnim);
  ctx.fillRect(px + 1, py + 2, 4, 8 - legAnim);

  // Body
  ctx.fillStyle = '#1e3a5a';
  ctx.fillRect(px - 7, py - 8, 14, 14);
  // Shirt highlight
  ctx.fillStyle = '#2a5080';
  ctx.fillRect(px - 6, py - 7, 12, 5);

  // Tie
  ctx.fillStyle = '#00e5ff';
  ctx.fillRect(px - 1, py - 7, 2, 10);

  // Head
  ctx.fillStyle = '#e0c49a';
  ctx.fillRect(px - 5, py - 20, 10, 10);

  // Hair
  ctx.fillStyle = '#3a2a10';
  ctx.fillRect(px - 5, py - 21, 10, 4);

  // Face direction indicator
  if (state.facing === 'down') {
    ctx.fillStyle = '#c0906a';
    ctx.fillRect(px - 2, py - 14, 4, 2); // mouth
    ctx.fillStyle = '#000';
    ctx.fillRect(px - 3, py - 17, 2, 2); // left eye
    ctx.fillRect(px + 1, py - 17, 2, 2); // right eye
  } else if (state.facing === 'up') {
    ctx.fillStyle = '#c0906a';
    // back of head
  } else if (state.facing === 'right') {
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 2, py - 17, 2, 2);
    ctx.fillStyle = '#c0906a';
    ctx.fillRect(px + 3, py - 14, 2, 1);
  } else {
    ctx.fillStyle = '#000';
    ctx.fillRect(px - 4, py - 17, 2, 2);
    ctx.fillStyle = '#c0906a';
    ctx.fillRect(px - 5, py - 14, 2, 1);
  }

  // Briefcase
  if (state.facing === 'right' || state.facing === 'down') {
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(px + 7, py - 6, 7, 6);
    ctx.fillStyle = '#c8a030';
    ctx.fillRect(px + 8, py - 7, 5, 2);
    ctx.fillStyle = '#6a5010';
    ctx.fillRect(px + 7, py - 3, 7, 1);
  } else {
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(px - 14, py - 6, 7, 6);
    ctx.fillStyle = '#c8a030';
    ctx.fillRect(px - 13, py - 7, 5, 2);
    ctx.fillStyle = '#6a5010';
    ctx.fillRect(px - 14, py - 3, 7, 1);
  }

  // Sprint sparkles
  if (state.sprint && isMoving && state.tick % 4 === 0) {
    spawnFootParticle(px + (Math.random()-0.5)*8, py);
  }
}

/* ── PARTICLES ─────────────────────────────── */
function drawParticles() {
  for (const p of state.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawFootParticles() {
  for (const p of state.footParticles) {
    ctx.globalAlpha = p.life * 0.4;
    ctx.fillStyle   = '#4a7090';
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);

  ctx.globalAlpha = 1;
}

    ];

    opts.forEach((opt, i) => {

      ctx.strokeRect(bx, by, ow, oh);

      // Number key
      ctx.fillStyle = '#1a3050';
      ctx.fillRect(bx + 6, by + 6, 18, 18);
      ctx.fillStyle = '#4a90c0';
      ctx.font = 'bold 13px -apple-system,system-ui,sans-serif';

      ctx.fillStyle = '#3a5570';
      wrapText(opt.desc, bx + 52, by + 38, ow - 58, 13);
    });

  } else if (state.dialogPhase === 'feedback') {
    const isOk = state.dialogCorrect;

    // Result banner
    ctx.fillStyle = isOk ? 'rgba(0,180,80,0.12)' : 'rgba(220,50,50,0.12)';

    ctx.fillRect(dx + dw/2 - 120, contY, 240, 28);

    ctx.textAlign = 'center';
    ctx.fillText('[E] CONTINUAR MISIÓN', CW/2, contY + 18);
    ctx.textAlign = 'left';
  }
}

function wrapText(text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let ly = y;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxW && line !== '') {
      ctx.fillText(line.trim(), x, ly);
      line = word + ' ';
      ly += lineH;
    } else {
      line = test;
    }
  }
  if (line.trim()) ctx.fillText(line.trim(), x, ly);
}

/* ── MINIMAP ────────────────────────────────── */
function drawMinimap() {
  const mw = 180, mh = 130;
  const mx = CW - mw - 10, my = 10;
  const scaleX = mw / (MAP_COLS * T);
  const scaleY = mh / (MAP_ROWS * T);
  const s = Math.min(scaleX, scaleY);

  ctx.fillStyle = 'rgba(5,10,18,0.92)';
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = '#1e3050';
  ctx.strokeRect(mx, my, mw, mh);

  // Tiles
  for (let row = 0; row < MAP_ROWS; row++) {
    for (let col = 0; col < MAP_COLS; col++) {
      const tile = M[row][col];
      if (tile === 1) { ctx.fillStyle = '#0c141d'; }
      else if (tile >= 2) { ctx.fillStyle = ROOMS[tile]?.accent + '40' || '#1a2535'; }
      else { ctx.fillStyle = '#111820'; }
      ctx.fillRect(mx + col * s * T, my + row * s * T, s * T + 0.5, s * T + 0.5);
    }
  }

  // NPCs on minimap
  for (const npc of NPCS) {
    ctx.fillStyle = state.completed.has(npc.id) ? '#27ae60' : npc.color;
    const nx = mx + (npc.tx + 0.5) * T * s;
    const ny = my + (npc.ty + 0.5) * T * s;
    ctx.fillRect(nx - 2, ny - 2, 4, 4);
  }

  // Player on minimap
  const pmx = mx + state.px * s;
  const pmy = my + state.py * s;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(pmx - 2, pmy - 2, 4, 4);

  // Camera viewport rect
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.strokeRect(mx + state.camX * s, my + state.camY * s, CW * s, CH * s);

  ctx.font = '10px -apple-system,system-ui,sans-serif';
  ctx.fillStyle = '#3a5a70';
  ctx.fillText('M: cerrar mapa', mx + 4, my + mh - 4);
}

  ctx.fillText(`XP acumulado: ${state.xp}`, CW/2, 238);
  ctx.fillText('Revisa el material de estudio e intenta de nuevo.', CW/2, 265);

  const pulse3 = 0.6 + Math.sin(state.tick * 0.07) * 0.4;
  ctx.globalAlpha = pulse3;
  ctx.font = '14px -apple-system,system-ui,sans-serif';
  ctx.fillStyle = '#cc3030';
  ctx.fillText('[ ENTER o CLICK para intentar de nuevo ]', CW/2, 320);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

/* ═══════════════════════════════════════════════════════
   HUD UPDATE
═══════════════════════════════════════════════════════ */
function updateHUD() {
  document.getElementById('tb-xp').textContent = state.xp;
  const lvl = getLevel(state.xp);
  const lvlEl = document.getElementById('tb-level');
  lvlEl.textContent = lvl.label;
  lvlEl.style.color  = lvl.color;
  document.getElementById('tb-score').textContent = `${state.correct}/7`;

  const livesWrap = document.getElementById('tb-lives-wrap');
  livesWrap.innerHTML = '';
  for (let i = 0; i < state.maxLives; i++) {
    const span = document.createElement('span');
    span.className = 'life-icon' + (i >= state.lives ? ' dead' : '');
    span.textContent = '❤️';
    livesWrap.appendChild(span);
  }
}

/* ═══════════════════════════════════════════════════════
   GAME RESET
═══════════════════════════════════════════════════════ */
function resetGame() {
  state.px = 7.5 * T; state.py = 6.5 * T;
  state.facing = 'down';
  state.vx = 0; state.vy = 0;
  state.animFrame = 0; state.animTick = 0;
  state.xp = 0; state.lives = 3;
  state.completed = new Set();
  state.correct = 0;
  state.dialogActive = false;
  state.dialogNpc = null;
  state.dialogPhase = 'none';
  state.particles = [];
  state.footParticles = [];
  state.flashTimer = 0;
  state.nearbyNpc = null;
  state.showMinimap = false;
  state.lastRoom = -1;
  state.screen = 'game';
  updateHUD();
}

/* ═══════════════════════════════════════════════════════
   START / CLICK
═══════════════════════════════════════════════════════ */
canvas.addEventListener('click', e => {
  if (state.screen === 'intro' || state.screen === 'win' || state.screen === 'dead') {
    resetGame();
    return;
  }
  if (state.screen === 'game' && state.dialogActive) {
    if (state.dialogPhase === 'feedback') {
      state.dialogActive = false;
      state.dialogPhase = 'none';
    } else if (state.dialogPhase === 'question') {
      // Click on option
      const npc = state.dialogNpc;
      const dw = 700, dh = 360;
      const dx = (CW - dw) / 2, dy = (CH - dh) / 2;
      const ow = (dw - 48) / 2, oh = 82;
      const ox0 = dx + 16, oy0 = dy + 142;
      const positions = [
        [ox0, oy0], [ox0 + ow + 16, oy0],
        [ox0, oy0 + oh + 8], [ox0 + ow + 16, oy0 + oh + 8]
      ];
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (CW / rect.width);
      const my = (e.clientY - rect.top)  * (CH / rect.height);
      positions.forEach(([bx, by], i) => {
        if (mx >= bx && mx <= bx + ow && my >= by && my <= by + oh) {
          selectChoice(i);
        }
      });
    }
  }
});

window.addEventListener('keydown', e2 => {
  if (e2.key === 'Enter') {
    if (state.screen === 'intro' || state.screen === 'win' || state.screen === 'dead') resetGame();
  }
});

/* ═══════════════════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════════════════ */
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

updateHUD();
loop();
</script>
</body>
</html>
