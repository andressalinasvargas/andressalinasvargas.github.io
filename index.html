<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso a Evaluación</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #0d0f1a;
            --surface: #13162a;
            --card:    #181c30;
            --border:  #252a45;
            --accent:  #00f5c4;
            --accent2: #7b5cfa;
            --text:    #e2e8f8;
            --muted:   #6b7499;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── GRID BACKGROUND ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* ── GLOW ORBS ── */
        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123,92,250,0.12) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            pointer-events: none;
        }

        .orb2 {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,245,196,0.08) 0%, transparent 70%);
            bottom: -80px;
            left: -80px;
            pointer-events: none;
        }

        /* ── CARD ── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 40px 36px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            animation: floatIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── TOP DECORATION ── */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 32px;
        }

        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
        }

        .dot-r { background: #ff4d6d; }
        .dot-y { background: #ffd166; }
        .dot-g { background: var(--accent); }

        .top-bar-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-left: auto;
            letter-spacing: 1px;
        }

        /* ── ICON ── */
        .icon-wrap {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(123,92,250,0.2), rgba(0,245,196,0.15));
            border: 1px solid rgba(0,245,196,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 24px;
            box-shadow: 0 0 24px rgba(0,245,196,0.1);
        }

        /* ── HEADING ── */
        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--text) 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* ── INPUT ── */
        .input-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .input-wrap label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .input-wrap input::placeholder {
            color: var(--muted);
            font-size: 14px;
        }

        .input-wrap input:focus {
            border-color: rgba(0,245,196,0.5);
            box-shadow: 0 0 0 3px rgba(0,245,196,0.08);
        }

        /* ── BUTTON ── */
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
            color: #0d0f1a;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(0,245,196,0.2);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,245,196,0.35);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        /* ── FOOTER ── */
        .footer {
            margin-top: 28px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .footer span {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="orb2"></div>

    <div class="card">

        <!-- Barra estilo editor -->
        <div class="top-bar">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
            <span class="top-bar-label">evaluacion.php</span>
        </div>

        <!-- Ícono -->
        <div class="icon-wrap">💻</div>

        <!-- Título -->
        <div class="tag">// sesión de examen</div>
        <h2>Ingreso a la Evaluación</h2>
        <p class="subtitle">Ingresa tu nombre completo para comenzar.<br>Tu progreso quedará registrado.</p>

        <!-- Formulario -->
        <form action="registro.php" method="POST">
            <div class="input-wrap">
                <label for="nombre">Nombre del estudiante</label>
                <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    placeholder="Ej: Juan García"
                    required
                    autocomplete="off"
                >
            </div>
            <button type="submit">Comenzar evaluación →</button>
        </form>

        <div class="footer">
            Sistema de Evaluación Web &nbsp;·&nbsp; <span>© 2026</span>
        </div>
    </div>

</body>
</html>
